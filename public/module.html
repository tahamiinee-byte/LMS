<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Module Portal</title>
    <style>
        /* --- General Setup --- */
        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            color: #333;
            background-color: #fcfcfc;
        }

        /* Increased container width for a "wider" feel */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 30px;
        }

        /* --- Header / Top Nav --- */
        .top-nav {
            background-color: #1a1a1a;
            color: #fff;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .portal-logo {
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        /* --- Blue Module Banner (Made larger/wider) --- */
        .module-banner {
            background-color: #005580;
            color: white;
            padding: 60px 0;
            /* Increased padding for more "size" */
            border-bottom: 5px solid #004466;
        }

        .module-banner h1 {
            margin: 0;
            font-size: 2rem;
            /* Larger font size */
            font-weight: 100;
        }

        .breadcrumb {
            font-size: 0.85rem;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            opacity: 0.8;
        }

        /* --- Three-Column Layout --- */
        .main-layout {
            display: flex;
            margin-top: 40px;
            gap: 35px;
            align-items: flex-start;
        }

        /* 1. Sidebar (Increased Size) */
        .sidebar {
            width: 280px;
            /* Increased from 220px */
            flex-shrink: 0;
        }

        .sidebar ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .sidebar ul li {
            border-bottom: 1px solid #e6e6e6;
        }

        .sidebar ul li a {
            display: block;
            padding: 18px 15px;
            /* Larger padding for links */
            color: #444;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.05rem;
            transition: all 0.2s ease;
        }

        .sidebar ul li a:hover {
            background-color: #f0f7ff;
            color: #005580;
            padding-left: 25px;
            /* Subtle hover slide effect */
        }

        /* 2. Middle Empty Box */
        .middle-content {
            flex-grow: 1;
            min-height: 500px;
            background: #fff;
            border: 2px dashed #d1d1d1;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aaa;
            font-style: italic;
        }

        /* 3. Info Panel (Right) */
        .info-panel {
            width: 320px;
            flex-shrink: 0;
            background: #fff;
            padding: 25px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .info-section h3 {
            font-size: 1.2rem;
            margin-top: 0;
            padding-bottom: 10px;
            border-bottom: 3px solid #005580;
            color: #222;
            margin-bottom: 15px;
        }

        .info-section p {
            font-size: 1rem;
            line-height: 1.6;
            color: #555;
        }

        .instructor-list {
            margin-top: 30px;
        }

        .instructor-name {
            display: block;
            font-size: 1rem;
            color: #005580;
            margin-bottom: 8px;
            text-decoration: none;
            font-weight: 500;
        }

        .instructor-name:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <header class="top-nav">
        <div class="portal-logo">NSCShub</div>
    </header>

    <section class="module-banner">
        <div class="container">
            <!-- CORRECT: id is an attribute, not literal text -->
            <h1 id="module-title"></h1>
        </div>
    </section>

    <main class="container main-layout">

        <aside class="sidebar">
            <ul>
                <li><a href="#">Lecture</a></li>
                <li><a href="#">TD</a></li>
                <li><a href="#">TP</a></li>
                <li><a href="#">Exams</a></li>
                <li><a href="#">Resources</a></li>
                <li><a href="#">Group Info</a></li>
            </ul>
        </aside>

        <section class="middle-content">
            <p>[ Main Content Area ]</p>
        </section>

        <aside class="info-panel">
            <div class="info-section">
                <h3>Module Description</h3>
                <p>
                    This section provides the syllabus, learning outcomes, and core concepts for
                    <strong id="module-name"></strong>.
                </p>
            </div>

            <div class="info-section instructor-list">
                <h3>Instructors</h3>
                <a href="#" class="instructor-name">Dr. Jane Smith</a>
                <a href="#" class="instructor-name">Prof. John Doe</a>
            </div>
        </aside>

    </main>

    <script>
        // get last non-empty URL segment:
        function getLastUrlSegment() {
            const parts = window.location.pathname.split('/').filter(Boolean);
            return parts.length ? parts[parts.length - 1] : '';
        }

        function formatModuleName(raw) {
            if (!raw) return 'Module';
            // decode URL-encoded parts and replace -, _, + with spaces
            const decoded = decodeURIComponent(raw).replace(/[+_-]+/g, ' ').trim();
            // Title-case each word
            return decoded.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        }

        const raw = getLastUrlSegment();
        const formatted = formatModuleName(raw);

        const titleEl = document.getElementById('module-title');
        const nameEl = document.getElementById('module-name');

        if (titleEl) titleEl.textContent = formatted;
        if (nameEl) nameEl.textContent = formatted;
    </script>

</body>

</html>
