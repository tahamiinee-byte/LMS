<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #f5f5f7;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      color: #1d1d1f;
      overflow-x: hidden;
    }

    /* ── Navbar ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 48px;
      height: 52px;
      background: rgba(255,255,255,.85);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid rgba(0,0,0,.08);
      animation: fadeDown .5s ease both;
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .nav-logo {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none;
    }
    .logo-icon {
      width: 28px; height: 28px;
      background: #1d1d1f;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { display: block; }
    .logo-name {
      font-size: 17px; font-weight: 600;
      color: #1d1d1f; letter-spacing: -.02em;
    }

    .nav-user { display: flex; align-items: center; gap: 10px; }
    .greeting { text-align: right; }
    .greeting-label {
      font-size: 11px; color: #86868b;
      letter-spacing: .04em; display: block; margin-bottom: 1px;
    }
    .greeting-name {
      font-size: 14px; font-weight: 500;
      color: #1d1d1f; display: block; min-width: 80px; text-align: right;
    }

    .greeting-name.loading, .skel {
      background: linear-gradient(90deg, #e8e8ed 25%, #f5f5f7 50%, #e8e8ed 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease infinite;
      border-radius: 4px;
      color: transparent !important;
      user-select: none;
    }
    .greeting-name.loading { height: 16px; width: 90px; display: inline-block; }

    @keyframes shimmer {
      0%   { background-position: 200% center; }
      100% { background-position: -200% center; }
    }

    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: #1d1d1f;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 500; color: #fff;
      cursor: pointer; transition: opacity .2s; flex-shrink: 0;
    }
    .avatar:hover { opacity: .75; }

    /* ── Main ── */
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 64px 32px 80px;
      animation: fadeUp .5s .1s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .section-header { margin-bottom: 40px; }
    .section-tag {
      font-size: 12px; color: #86868b;
      letter-spacing: .06em; text-transform: uppercase;
      display: block; margin-bottom: 6px;
    }
    .section-title {
      font-size: 32px; font-weight: 600;
      color: #1d1d1f; letter-spacing: -.03em;
    }
    .section-subtitle {
      font-size: 14px; color: #86868b;
      margin-top: 6px; font-weight: 400;
    }

    /* ── Module Grid ── */
    .modules {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    @media (max-width: 640px) {
      .modules { grid-template-columns: 1fr; }
      nav { padding: 0 24px; }
      main { padding: 40px 20px 60px; }
    }

    /* ── Module Card ── */
    .module {
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      cursor: pointer;
      border: 1px solid rgba(0,0,0,.06);
      background: #ffffff;
      text-decoration: none;
      display: block;
      transition: transform .2s ease, box-shadow .2s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
      animation: cardIn .5s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .module:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(0,0,0,.1);
    }
    .module:active { transform: scale(.98); }

    /* colour band */
    .module-band {
      height: 120px;
      position: relative;
      display: flex;
      align-items: center;
      padding: 0 28px;
      gap: 16px;
      overflow: hidden;
      background: var(--band-bg);
    }

    /* subtle pattern overlay */
    .module-band::before {
      content: '';
      position: absolute; inset: 0;
      background-image: var(--band-pattern);
      opacity: .06;
    }

    /* glow dot — toned down for apple feel */
    .module-band::after {
      content: '';
      position: absolute;
      width: 160px; height: 160px;
      border-radius: 50%;
      top: -50px; right: -20px;
      filter: blur(50px);
      background: var(--accent);
      opacity: .25;
      transition: opacity .3s, transform .3s;
    }
    .module:hover .module-band::after { opacity: .4; transform: scale(1.1); }

    .module-icon {
      width: 48px; height: 48px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      position: relative; z-index: 2;
      flex-shrink: 0;
      background: var(--icon-bg);
      border: 1px solid var(--icon-border);
      transition: transform .2s ease;
    }
    .module:hover .module-icon { transform: scale(1.06); }

    .band-title {
      position: relative;
      z-index: 2;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -.02em;
      color: #fff;
    }

    /* body */
    .module-body { padding: 20px 24px 24px; }

    .module-desc {
      font-size: 13px; color: #86868b;
      line-height: 1.55; margin-bottom: 16px;
    }

    .module-footer {
      display: flex; align-items: center; justify-content: space-between;
    }
    .module-meta { display: flex; gap: 14px; }
    .meta-pill {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; color: #86868b;
    }
    .meta-pill svg { opacity: .7; }

    .module-cta {
      display: flex; align-items: center; gap: 4px;
      font-size: 13px; font-weight: 500;
      color: #0071e3;
      opacity: 0; transform: translateX(-6px);
      transition: opacity .2s, transform .2s;
    }
    .module:hover .module-cta { opacity: 1; transform: translateX(0); }

    .progress-track {
      height: 3px;
      background: #f5f5f7;
      border-radius: 99px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, var(--accent-dim), var(--accent));
      transition: width .9s cubic-bezier(.16,1,.3,1);
      width: 0;
    }
    .module.mounted .progress-fill { width: var(--prog); }

    /* ── Skeleton cards ── */
    .module-skeleton {
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(0,0,0,.06);
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
      animation: cardIn .5s cubic-bezier(.16,1,.3,1) both;
    }
    .skel-band { height: 120px; }
    .skel-body { padding: 20px 24px 24px; }
    .skel-line {
      height: 10px; border-radius: 6px; margin-bottom: 10px;
    }
    .skel-line-short { width: 55%; }
    .skel-line-med   { width: 80%; }
    .skel-line-full  { width: 100%; }
    .skel-prog { height: 3px; border-radius: 99px; margin-bottom: 16px; }

    /* ── Global error banner ── */
    .global-error {
      display: flex; align-items: center; gap: 10px;
      background: #fff2f2;
      border: 1px solid #ffd5d5;
      border-radius: 14px;
      padding: 16px 20px;
      color: #c0392b;
      font-size: 13.5px;
      grid-column: 1 / -1;
    }

    /* ── Empty state ── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: #86868b;
    }
    .empty-state svg { margin: 0 auto 16px; display: block; opacity: .3; }
    .empty-state p   { font-size: 14px; }

    .error-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; color: #c0392b;
      background: #fff2f2; border: 1px solid #ffd5d5;
      padding: 3px 8px; border-radius: 99px;
    }
  </style>
</head>
<body>

  <!-- ── Navbar ── -->
  <nav>
    <a href="#" class="nav-logo">
      <div class="logo-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 2 7 12 12 22 7"/>
          <polyline points="2 17 12 22 22 17"/>
          <polyline points="2 12 12 17 22 12"/>
        </svg>
      </div>
      <span class="logo-name">Académie</span>
    </a>
    <div class="nav-user">
      <div class="greeting">
        <span class="greeting-label">Welcome back</span>
        <span class="greeting-name loading" id="userName">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>
      </div>
      <div class="avatar" id="avatarEl">?</div>
    </div>
  </nav>

  <!-- ── Main ── -->
  <main>
    <div class="section-header">
      <span class="section-tag">Your Classes</span>
      <h1 class="section-title">My Modules</h1>
      <p class="section-subtitle">Select a module to continue where you left off.</p>
    </div>

    <div class="modules" id="modulesGrid">
      <div class="module-skeleton">
        <div class="skel skel-band"></div>
        <div class="skel-body">
          <div class="skel skel-prog"></div>
          <div class="skel skel-line skel-line-full" style="margin-bottom:8px"></div>
          <div class="skel skel-line skel-line-med"></div>
        </div>
      </div>
      <div class="module-skeleton" style="animation-delay:.08s">
        <div class="skel skel-band"></div>
        <div class="skel-body">
          <div class="skel skel-prog"></div>
          <div class="skel skel-line skel-line-full" style="margin-bottom:8px"></div>
          <div class="skel skel-line skel-line-short"></div>
        </div>
      </div>
    </div>
  </main>

  <script>
    const THEMES = [
      {
        bandBg: 'linear-gradient(135deg, #1c1c1e 0%, #2c2c2e 100%)',
        bandPattern: 'repeating-linear-gradient(60deg,#fff 0,#fff 1px,transparent 1px,transparent 40px),repeating-linear-gradient(-60deg,#fff 0,#fff 1px,transparent 1px,transparent 40px)',
        accent: '#c8a050', accentDim: '#8a6030', titleColor: '#fff',
        iconBg: 'rgba(255,255,255,.15)', iconBorder: 'rgba(255,255,255,.2)',
        iconShadow: 'none', borderHover: 'rgba(0,0,0,.1)',
        shadowHover: '0 16px 48px rgba(0,0,0,.14)',
        iconStroke: '#fff',
        iconPath: '<polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/>',
      },
      {
        bandBg: 'linear-gradient(135deg, #1c3a5e 0%, #0d2240 100%)',
        bandPattern: 'radial-gradient(circle,#fff 1px,transparent 1px)',
        accent: '#0071e3', accentDim: '#004aaa', titleColor: '#fff',
        iconBg: 'rgba(255,255,255,.15)', iconBorder: 'rgba(255,255,255,.2)',
        iconShadow: 'none', borderHover: 'rgba(0,0,0,.1)',
        shadowHover: '0 16px 48px rgba(0,113,227,.12)',
        iconStroke: '#fff',
        iconPath: '<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/>',
      },
      {
        bandBg: 'linear-gradient(135deg, #2d1c1e 0%, #1a0d10 100%)',
        bandPattern: 'repeating-linear-gradient(45deg,#fff 0,#fff 1px,transparent 1px,transparent 30px)',
        accent: '#c0392b', accentDim: '#7a1e15', titleColor: '#fff',
        iconBg: 'rgba(255,255,255,.15)', iconBorder: 'rgba(255,255,255,.2)',
        iconShadow: 'none', borderHover: 'rgba(0,0,0,.1)',
        shadowHover: '0 16px 48px rgba(192,57,43,.12)',
        iconStroke: '#fff',
        iconPath: '<rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="2" x2="9" y2="4"/><line x1="15" y1="2" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="22"/><line x1="15" y1="20" x2="15" y2="22"/><line x1="20" y1="9" x2="22" y2="9"/><line x1="20" y1="14" x2="22" y2="14"/><line x1="2" y1="9" x2="4" y2="9"/><line x1="2" y1="14" x2="4" y2="14"/>',
      },
      {
        bandBg: 'linear-gradient(135deg, #1c2e1c 0%, #0d1a0d 100%)',
        bandPattern: 'radial-gradient(circle,#fff 1px,transparent 1px)',
        accent: '#27ae60', accentDim: '#145a32', titleColor: '#fff',
        iconBg: 'rgba(255,255,255,.15)', iconBorder: 'rgba(255,255,255,.2)',
        iconShadow: 'none', borderHover: 'rgba(0,0,0,.1)',
        shadowHover: '0 16px 48px rgba(39,174,96,.12)',
        iconStroke: '#fff',
        iconPath: '<line x1="19" y1="5" x2="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/>',
      },
      {
        bandBg: 'linear-gradient(135deg, #2a1a08 0%, #180e04 100%)',
        bandPattern: 'repeating-linear-gradient(0deg,#fff 0,#fff 1px,transparent 1px,transparent 24px),repeating-linear-gradient(90deg,#fff 0,#fff 1px,transparent 1px,transparent 24px)',
        accent: '#e37400', accentDim: '#903010', titleColor: '#fff',
        iconBg: 'rgba(255,255,255,.15)', iconBorder: 'rgba(255,255,255,.2)',
        iconShadow: 'none', borderHover: 'rgba(0,0,0,.1)',
        shadowHover: '0 16px 48px rgba(227,116,0,.12)',
        iconStroke: '#fff',
        iconPath: '<path d="M12 22V12"/><path d="m17 7-5-5-5 5"/><path d="M5 22h14"/>',
      },
    ];

    const ICON_MAP = {
      algo: '<polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/>',
      analyse: '<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/>',
      math: '<path d="M12 2v20M2 12h20M4.93 4.93l14.14 14.14M19.07 4.93 4.93 19.07"/>',
      physique: '<circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>',
      info: '<rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h.01M15 9h.01M9 15h.01M15 15h.01M12 12h.01"/>',
      reseau: '<circle cx="12" cy="12" r="3"/><line x1="12" y1="3" x2="12" y2="9"/><line x1="12" y1="15" x2="12" y2="21"/><line x1="3" y1="12" x2="9" y2="12"/><line x1="15" y1="12" x2="21" y2="12"/>',
      stat: '<path d="M2 20h.01M7 20v-4M12 20v-8M17 20V8M22 4v16"/>',
      default: '<rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>',
    };

    function getIconPath(name = '') {
      const key = Object.keys(ICON_MAP).find(k => name.toLowerCase().includes(k));
      return key ? ICON_MAP[key] : ICON_MAP.default;
    }

    function buildCard(mod, index) {
      const themeIndex = (typeof mod.theme === 'number') ? mod.theme % THEMES.length : index % THEMES.length;
      const t = THEMES[themeIndex];

      const name       = mod.module_name || mod.name || mod.title || 'Module';
      const description = mod.description || mod.desc || '';
      const progress   = Math.min(100, Math.max(0, Number(mod.progress ?? mod.completion ?? 0)));
      const lessons    = mod.lessons ?? mod.lesson_count ?? mod.lessonCount ?? null;
      const href       = mod.href ?? mod.url ?? mod.link ?? '#';
      const iconPath   = mod.iconPath || getIconPath(name);

      const card = document.createElement('a');
      card.href = href;
      card.className = 'module';

      const vars = [
        `--accent:${t.accent}`,
        `--accent-dim:${t.accentDim}`,
        `--band-bg:${t.bandBg}`,
        `--band-pattern:${t.bandPattern}`,
        `--title-color:${t.titleColor}`,
        `--icon-bg:${t.iconBg}`,
        `--icon-border:${t.iconBorder}`,
        `--icon-shadow:${t.iconShadow}`,
        `--border-hover:${t.borderHover}`,
        `--shadow-hover:${t.shadowHover}`,
        `--prog:${progress}%`,
      ].join(';');
      card.setAttribute('style', vars);

      card.innerHTML = `
        <div class="module-band">
          <div class="module-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                 stroke="${t.iconStroke}" stroke-width="1.8"
                 stroke-linecap="round" stroke-linejoin="round">
              ${iconPath}
            </svg>
          </div>
          <span class="band-title">${escHtml(name)}</span>
        </div>
        <div class="module-body">
          <div class="progress-track">
            <div class="progress-fill"></div>
          </div>
          ${description ? `<p class="module-desc">${escHtml(description)}</p>` : ''}
          <div class="module-footer">
            <div class="module-meta">
              ${lessons != null ? `
              <span class="meta-pill">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="4" width="18" height="18" rx="2"/>
                  <line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
                ${Number(lessons)} lesson${Number(lessons) !== 1 ? 's' : ''}
              </span>` : ''}
              <span class="meta-pill">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="10"/>
                  <polyline points="12 6 12 12 16 14"/>
                </svg>
                ${progress}% done
              </span>
            </div>
            <span class="module-cta">
              Open
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"/>
                <polyline points="12 5 19 12 12 19"/>
              </svg>
            </span>
          </div>
        </div>
      `;
      return card;
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function loadModules() {
      const grid = document.getElementById('modulesGrid');
      try {
        const res = await fetch('/api/modules');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const modules = Array.isArray(data) ? data : (data.modules ?? data.data ?? [data]);
        grid.innerHTML = '';
        if (modules.length === 0) {
          grid.innerHTML = `
            <div class="empty-state">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <path d="M3 9h18M9 21V9"/>
              </svg>
              <p>No modules found. Check back soon.</p>
            </div>`;
          return;
        }
        modules.forEach((mod, i) => {
          const card = buildCard(mod, i);
          card.style.cssText += `;animation-delay:${0.15 + i * 0.07}s`;
          grid.appendChild(card);
        });
        setTimeout(() => {
          grid.querySelectorAll('.module').forEach((card, i) => {
            setTimeout(() => card.classList.add('mounted'), i * 100);
          });
        }, 400);
      } catch (err) {
        grid.innerHTML = `
          <div class="global-error">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            Could not load modules — <strong style="margin-left:4px">${escHtml(err.message)}</strong>
          </div>`;
        console.error('loadModules:', err);
      }
    }

    async function loadUser() {
      try {
        const res = await fetch('/api/users');
        if (!res.ok) throw new Error('Network response was not ok');
        const data = await res.json();
        const user = Array.isArray(data) ? data[0] : data;
        const firstname = user?.firstname || '';
        const lastname  = user?.lastname  || '';
        const name = `${firstname} ${lastname}`.trim() || 'Student';
        const nameEl = document.getElementById('userName');
        nameEl.textContent = name;
        nameEl.classList.remove('loading');
        const initials = name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
        document.getElementById('avatarEl').textContent = initials;
      } catch (err) {
        const nameEl = document.getElementById('userName');
        nameEl.classList.remove('loading');
        nameEl.innerHTML = '<span class="error-badge">Unavailable</span>';
        document.getElementById('avatarEl').textContent = '?';
        console.warn('Could not load user:', err);
      }
    }

    loadUser();
    loadModules();
  </script>
</body>
</html>
