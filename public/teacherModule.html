<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Submit Content</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f1117;
            --surface: #181c27;
            --border: #272d3f;
            --accent: #4f7cff;
            --accent2: #a78bfa;
            --text: #e8eaf0;
            --muted: #6b7280;
            --success: #34d399;
            --danger: #f87171;
            --radius: 14px;
        }

        body {
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .55);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            animation: fadeIn .2s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 100%;
            max-width: 560px;
            overflow: hidden;
            animation: slideUp .25s cubic-bezier(.16, 1, .3, 1);
            box-shadow: 0 32px 80px rgba(0, 0, 0, .5);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(24px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .modal-header {
            padding: 28px 32px 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .modal-header h2 {
            font-family: 'Syne', sans-serif;
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -.01em;
        }

        .modal-header p {
            color: var(--muted);
            font-size: .85rem;
            margin-top: 4px;
        }

        .close-btn {
            background: var(--border);
            border: none;
            cursor: pointer;
            color: var(--muted);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .15s, color .15s;
            flex-shrink: 0;
            margin-left: 16px;
            margin-top: 2px;
        }

        .close-btn:hover {
            background: var(--danger);
            color: #fff;
        }

        .type-tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 24px 32px 0;
        }

        .tab {
            position: relative;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 14px;
            cursor: pointer;
            transition: border-color .2s;
            display: flex;
            align-items: center;
            gap: 12px;
            overflow: hidden;
        }

        .tab::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity .2s;
        }

        .tab.file::before {
            background: linear-gradient(135deg, rgba(79, 124, 255, .08), transparent);
        }

        .tab.announce::before {
            background: linear-gradient(135deg, rgba(167, 139, 250, .08), transparent);
        }

        .tab:hover::before,
        .tab.active::before {
            opacity: 1;
        }

        .tab.active.file {
            border-color: var(--accent);
        }

        .tab.active.announce {
            border-color: var(--accent2);
        }

        .tab-icon {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .tab.file .tab-icon {
            background: rgba(79, 124, 255, .15);
            color: var(--accent);
        }

        .tab.announce .tab-icon {
            background: rgba(167, 139, 250, .15);
            color: var(--accent2);
        }

        .tab-label {
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: .92rem;
        }

        .tab-sub {
            font-size: .75rem;
            color: var(--muted);
            margin-top: 2px;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 24px 32px 0;
        }

        .form-body {
            padding: 24px 32px 32px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        label {
            font-size: .8rem;
            font-weight: 500;
            color: var(--muted);
            letter-spacing: .03em;
            text-transform: uppercase;
        }

        input[type="text"],
        textarea,
        select {
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: .92rem;
            padding: 12px 14px;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
            width: 100%;
            resize: none;
        }

        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79, 124, 255, .12);
        }

        textarea {
            min-height: 110px;
            line-height: 1.6;
        }

        select option {
            background: var(--surface);
        }

        .scope-row {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .group-field {
            animation: expandIn .2s cubic-bezier(.16, 1, .3, 1);
        }

        .group-field.hidden {
            display: none;
        }

        @keyframes expandIn {
            from {
                opacity: 0;
                transform: scaleY(.8);
                transform-origin: top;
            }

            to {
                opacity: 1;
                transform: scaleY(1);
            }
        }

        .chips-wrap {
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 8px 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            align-items: center;
            cursor: text;
            transition: border-color .2s, box-shadow .2s;
            min-height: 48px;
        }

        .chips-wrap:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79, 124, 255, .12);
        }

        .chip {
            background: rgba(79, 124, 255, .15);
            color: var(--accent);
            border: 1px solid rgba(79, 124, 255, .3);
            border-radius: 6px;
            padding: 3px 8px 3px 10px;
            font-size: .82rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Syne', sans-serif;
            letter-spacing: .03em;
            animation: chipIn .15s cubic-bezier(.16, 1, .3, 1);
        }

        @keyframes chipIn {
            from {
                opacity: 0;
                transform: scale(.8)
            }

            to {
                opacity: 1;
                transform: scale(1)
            }
        }

        .chip-remove {
            background: none;
            border: none;
            cursor: pointer;
            color: rgba(79, 124, 255, .6);
            font-size: .85rem;
            padding: 0;
            line-height: 1;
            transition: color .15s;
        }

        .chip-remove:hover {
            color: var(--danger);
        }

        .chip-input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: .9rem;
            min-width: 80px;
            flex: 1;
            padding: 3px 4px;
            text-transform: uppercase;
        }

        .chip-input::placeholder {
            color: var(--muted);
            text-transform: none;
        }

        .chips-hint {
            font-size: .75rem;
            color: var(--muted);
            margin-top: 5px;
        }

        kbd {
            background: var(--border);
            padding: 1px 5px;
            border-radius: 4px;
            font-size: .72rem;
        }

        .dropzone {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 32px 20px;
            text-align: center;
            cursor: pointer;
            transition: border-color .2s, background .2s;
            position: relative;
        }

        .dropzone:hover,
        .dropzone.dragover {
            border-color: var(--accent);
            background: rgba(79, 124, 255, .05);
        }

        .dropzone input {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .drop-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .drop-title {
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: .95rem;
        }

        .drop-sub {
            font-size: .8rem;
            color: var(--muted);
            margin-top: 4px;
        }

        .file-chosen {
            display: none;
            align-items: center;
            gap: 10px;
            background: rgba(79, 124, 255, .08);
            border: 1.5px solid var(--accent);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: .88rem;
        }

        .file-chosen.show {
            display: flex;
        }

        .file-chosen .fname {
            font-weight: 500;
            flex: 1;
            text-align: left;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-chosen .fsize {
            color: var(--muted);
            font-size: .78rem;
            flex-shrink: 0;
        }

        .remove-file {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--muted);
            font-size: 1rem;
            padding: 0;
            transition: color .15s;
        }

        .remove-file:hover {
            color: var(--danger);
        }

        .panel {
            display: none;
            flex-direction: column;
            gap: 18px;
        }

        .panel.active {
            display: flex;
            animation: fadeIn .2s ease;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            padding-top: 4px;
        }

        .btn {
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: .88rem;
            padding: 11px 22px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: opacity .15s, transform .1s;
        }

        .btn:active {
            transform: scale(.97);
        }

        .btn:disabled {
            opacity: .5;
            cursor: not-allowed;
        }

        .btn-ghost {
            background: var(--border);
            color: var(--muted);
        }

        .btn-ghost:hover {
            color: var(--text);
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 16px rgba(79, 124, 255, .3);
        }

        .btn-primary:hover:not(:disabled) {
            opacity: .9;
        }

        .btn-primary.announce-mode {
            background: var(--accent2);
            box-shadow: 0 4px 16px rgba(167, 139, 250, .3);
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--surface);
            border: 1px solid var(--success);
            color: var(--success);
            padding: 12px 20px;
            border-radius: 12px;
            font-size: .88rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transform: translateY(80px);
            transition: transform .3s cubic-bezier(.16, 1, .3, 1);
            z-index: 100;
        }

        .toast.show {
            transform: translateY(0);
        }
    </style>
</head>

<body>

    <div class="overlay">
        <div class="modal">

            <div class="modal-header">
                <div>
                    <h2>Submit New Content</h2>
                    <p>Choose what you want to add to this module</p>
                </div>
                <button class="close-btn" onclick="closeModal()">✕</button>
            </div>

            <div class="type-tabs">
                <div class="tab file active" onclick="switchType('file')">
                    <div class="tab-icon">📄</div>
                    <div>
                        <div class="tab-label">File</div>
                        <div class="tab-sub">PDF, slides, docs…</div>
                    </div>
                </div>
                <div class="tab announce" onclick="switchType('announce')">
                    <div class="tab-icon">📢</div>
                    <div>
                        <div class="tab-label">Announcement</div>
                        <div class="tab-sub">Message to students</div>
                    </div>
                </div>
            </div>

            <div class="divider"></div>

            <div class="form-body">

                <!-- FILE PANEL -->
                <div class="panel active" id="panel-file">

                    <div class="field">
                        <label>File *</label>
                        <div class="dropzone" id="dropzone">
                            <input type="file" id="fileInput" onchange="handleFile(this)" />
                            <div class="drop-icon">☁️</div>
                            <div class="drop-title">Drop your file here</div>
                            <div class="drop-sub">or click to browse</div>
                        </div>
                        <div class="file-chosen" id="fileChosen">
                            <span>📎</span>
                            <span class="fname" id="fileName"></span>
                            <span class="fsize" id="fileSize"></span>
                            <button class="remove-file" onclick="removeFile()">✕</button>
                        </div>
                    </div>

                    <div class="field">
                        <label>Title *</label>
                        <input type="text" id="file-title" placeholder="e.g. Lecture 3 — Binary Trees" />
                    </div>

                    <div class="field">
                        <label>File Type *</label>
                        <select id="file-type">
                            <option value="" disabled selected>Select a type</option>
                            <option value="lecture">Lecture</option>
                            <option value="td">TD</option>
                            <option value="tp">TP</option>
                            <option value="exam">Exam</option>
                            <option value="solution">Solution</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <div class="field">
                        <label>Description</label>
                        <textarea id="file-desc"
                            placeholder="Optional — what should students know about this file?"></textarea>
                    </div>

                    <div class="scope-row">
                        <div class="field">
                            <label>Scope *</label>
                            <select id="file-scope" onchange="toggleGroup('file')">
                                <option value="" disabled selected>Select scope</option>
                                <option value="module">Whole Module</option>
                                <option value="group">Specific Groups</option>
                            </select>
                        </div>
                        <div class="field group-field hidden" id="file-group-wrap">
                            <label>Groups *
                                <span style="color:var(--muted);font-size:.75rem;text-transform:none;letter-spacing:0">—
                                    add one or more</span>
                            </label>
                            <div class="chips-wrap" id="file-chips-wrap"
                                onclick="document.getElementById('file-group-input').focus()">
                                <input class="chip-input" id="file-group-input"
                                    placeholder="Type a group code, press Enter or Space…" maxlength="5"
                                    onkeydown="handleChipKey(event,'file')"
                                    oninput="this.value=this.value.toUpperCase()" />
                            </div>
                            <span class="chips-hint">e.g. G1A · G2B — press <kbd>Enter</kbd> or <kbd>Space</kbd> to
                                add</span>
                        </div>
                    </div>

                </div>

                <!-- ANNOUNCEMENT PANEL -->
                <div class="panel" id="panel-announce">

                    <div class="field">
                        <label>Title *</label>
                        <input type="text" id="ann-title" placeholder="e.g. Exam rescheduled to Friday" />
                    </div>

                    <div class="field">
                        <label>Content *</label>
                        <textarea id="ann-content" style="min-height:140px"
                            placeholder="Write your announcement here…"></textarea>
                    </div>

                    <div class="scope-row">
                        <div class="field">
                            <label>Scope *</label>
                            <select id="ann-scope" onchange="toggleGroup('ann')">
                                <option value="" disabled selected>Select scope</option>
                                <option value="module">Whole Module</option>
                                <option value="group">Specific Groups</option>
                            </select>
                        </div>
                        <div class="field group-field hidden" id="ann-group-wrap">
                            <label>Groups *
                                <span style="color:var(--muted);font-size:.75rem;text-transform:none;letter-spacing:0">—
                                    add one or more</span>
                            </label>
                            <div class="chips-wrap" id="ann-chips-wrap"
                                onclick="document.getElementById('ann-group-input').focus()">
                                <input class="chip-input" id="ann-group-input"
                                    placeholder="Type a group code, press Enter or Space…" maxlength="5"
                                    onkeydown="handleChipKey(event,'ann')"
                                    oninput="this.value=this.value.toUpperCase()" />
                            </div>
                            <span class="chips-hint">e.g. G1A · G2B — press <kbd>Enter</kbd> or <kbd>Space</kbd> to
                                add</span>
                        </div>
                    </div>

                </div>

                <div class="modal-footer">
                    <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
                    <button class="btn btn-primary" id="submitBtn" onclick="handleSubmit()">Upload File</button>
                </div>

            </div>
        </div>
    </div>

    <div class="toast" id="toast">✓ <span id="toastMsg"></span></div>

    <script>
        let currentType = 'file';

        // Pull module name from URL: /modules/algo101 → "algo101"
        const moduleName = window.location.pathname.split('/')[2];

        // ── Type switcher ──
        function switchType(type) {
            currentType = type;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector('.tab.' + (type === 'file' ? 'file' : 'announce')).classList.add('active');
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById('panel-' + (type === 'file' ? 'file' : 'announce')).classList.add('active');
            const btn = document.getElementById('submitBtn');
            if (type === 'file') {
                btn.textContent = 'Upload File';
                btn.classList.remove('announce-mode');
            } else {
                btn.textContent = 'Post Announcement';
                btn.classList.add('announce-mode');
            }
        }

        // ── Scope toggle ──
        function toggleGroup(prefix) {
            const scope = document.getElementById(prefix + '-scope').value;
            const wrap = document.getElementById(prefix + '-group-wrap');
            if (scope === 'group') {
                wrap.classList.remove('hidden');
            } else {
                wrap.classList.add('hidden');
                chips[prefix] = [];
                renderChips(prefix);
            }
        }

        // ── Chips ──
        const chips = { file: [], ann: [] };

        function handleChipKey(e, prefix) {
            const input = e.target;
            const val = input.value.trim();
            if ((e.key === 'Enter' || e.key === ' ') && val) {
                e.preventDefault();
                addChip(prefix, val);
                input.value = '';
            } else if (e.key === 'Backspace' && !input.value && chips[prefix].length) {
                removeChip(prefix, chips[prefix][chips[prefix].length - 1]);
            }
        }

        function addChip(prefix, val) {
            if (!val || chips[prefix].includes(val)) return;
            chips[prefix].push(val);
            renderChips(prefix);
        }

        function removeChip(prefix, val) {
            chips[prefix] = chips[prefix].filter(c => c !== val);
            renderChips(prefix);
        }

        function renderChips(prefix) {
            const wrap = document.getElementById(prefix + '-chips-wrap');
            const input = document.getElementById(prefix + '-group-input');
            wrap.querySelectorAll('.chip').forEach(c => c.remove());
            chips[prefix].forEach(val => {
                const chip = document.createElement('div');
                chip.className = 'chip';
                chip.innerHTML = `${val}<button class="chip-remove" onclick="removeChip('${prefix}','${val}')">✕</button>`;
                wrap.insertBefore(chip, input);
            });
        }

        // Captures anything typed but not yet confirmed with Enter/Space
        function getGroups(prefix) {
            const live = document.getElementById(prefix + '-group-input').value.trim();
            if (live) addChip(prefix, live);
            return [...chips[prefix]];
        }

        // ── Drag & Drop ──
        const dz = document.getElementById('dropzone');
        dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
        dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
        dz.addEventListener('drop', e => {
            e.preventDefault(); dz.classList.remove('dragover');
            const f = e.dataTransfer.files[0];
            if (f) applyFile(f);
        });

        function handleFile(input) { if (input.files[0]) applyFile(input.files[0]); }

        function applyFile(f) {
            document.getElementById('fileName').textContent = f.name;
            document.getElementById('fileSize').textContent = formatSize(f.size);
            document.getElementById('dropzone').style.display = 'none';
            document.getElementById('fileChosen').classList.add('show');
        }

        function removeFile() {
            document.getElementById('fileInput').value = '';
            document.getElementById('fileChosen').classList.remove('show');
            document.getElementById('dropzone').style.display = '';
        }

        function formatSize(b) {
            if (b < 1024) return b + ' B';
            if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
            return (b / 1048576).toFixed(1) + ' MB';
        }

        // ── Submit ──
        async function handleSubmit() {
            const btn = document.getElementById('submitBtn');

            if (currentType === 'file') {
                const file = document.getElementById('fileInput').files[0];
                const title = document.getElementById('file-title').value.trim();
                const type = document.getElementById('file-type').value;
                const desc = document.getElementById('file-desc').value.trim();
                const scope = document.getElementById('file-scope').value;
                const groups = getGroups('file');

                if (!file) return alert('Please select a file.');
                if (!title) return alert('Title is required.');
                if (!type) return alert('Please select a file type.');
                if (!scope) return alert('Please select a scope.');
                if (scope === 'group' && !groups.length) return alert('Please add at least one group.');

                // Build FormData — text fields first, file last
                const formData = new FormData();
                formData.append('module_name', moduleName);
                formData.append('title', title);
                formData.append('type', type);
                formData.append('description', desc);
                formData.append('scope', scope);
                formData.append('group_encodings', JSON.stringify(groups)); // array as JSON string
                formData.append('file', file);                   // file always last

                btn.disabled = true;
                btn.textContent = 'Uploading…';

                try {
                    const res = await fetch('/api/resources', {
                        method: 'POST',
                        credentials: 'include',  // sends session cookie
                        body: formData,   // ⚠️ no Content-Type — browser sets it with correct boundary
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Upload failed');
                    showToast('File "' + title + '" uploaded successfully!');
                } catch (err) {
                    alert(err.message);
                } finally {
                    btn.disabled = false;
                    btn.textContent = 'Upload File';
                }

            } else {
                const title = document.getElementById('ann-title').value.trim();
                const content = document.getElementById('ann-content').value.trim();
                const scope = document.getElementById('ann-scope').value;
                const groups = getGroups('ann');

                if (!title) return alert('Title is required.');
                if (!content) return alert('Content is required.');
                if (!scope) return alert('Please select a scope.');
                if (scope === 'group' && !groups.length) return alert('Please add at least one group.');

                btn.disabled = true;
                btn.textContent = 'Posting…';

                try {
                    const res = await fetch('/api/announcements', {
                        method: 'POST',
                        credentials: 'include',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            module_name: moduleName,
                            title,
                            content,
                            scope,
                            group_encodings: groups,
                        }),
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Post failed');
                    showToast('Announcement posted successfully!');
                } catch (err) {
                    alert(err.message);
                } finally {
                    btn.disabled = false;
                    btn.textContent = 'Post Announcement';
                }
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function closeModal() {
            document.querySelector('.overlay').style.animation = 'fadeOut .15s ease forwards';
            document.querySelector('.modal').style.animation = 'slideDown .15s ease forwards';
        }
    </script>
</body>

</html>
