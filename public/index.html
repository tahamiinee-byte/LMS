<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background: #f5f5f7;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* ── Card ── */
.card {
  width: 100%;
  max-width: 400px;
  margin: 20px;
  background: #ffffff;
  border-radius: 18px;
  padding: 48px 40px 40px;
  box-shadow: 0 2px 20px rgba(0,0,0,.08), 0 0 0 1px rgba(0,0,0,.04);
  animation: cardIn .5s cubic-bezier(.16,1,.3,1) both;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Logo ── */
.logo-wrap { text-align: center; margin-bottom: 32px; }

.logo-icon {
  width: 56px; height: 56px;
  margin: 0 auto 16px;
  display: flex; align-items: center; justify-content: center;
  animation: iconPop .5s .15s cubic-bezier(.16,1,.3,1) both;
}
@keyframes iconPop {
  from { opacity: 0; transform: scale(.7); }
  to   { opacity: 1; transform: scale(1); }
}

h1 {
  font-size: 24px;
  font-weight: 600;
  color: #1d1d1f;
  letter-spacing: -.02em;
  margin-bottom: 4px;
}
.subtitle {
  font-size: 14px;
  color: #86868b;
  font-weight: 400;
}

/* ── Fields ── */
.field { margin-bottom: 12px; }

.field label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: #1d1d1f;
  margin-bottom: 6px;
}

.field input {
  width: 100%;
  background: #ffffff;
  border: 1.5px solid #d2d2d7;
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 15px;
  font-family: inherit;
  color: #1d1d1f;
  transition: border-color .2s, box-shadow .2s;
  outline: none;
}
.field input::placeholder { color: #c7c7cc; }
.field input:focus {
  border-color: #0071e3;
  box-shadow: 0 0 0 3px rgba(0,113,227,.15);
}

/* password toggle */
.field { position: relative; }
.field .toggle {
  position: absolute;
  right: 12px; top: 34px;
  background: none; border: none;
  cursor: pointer;
  color: #86868b;
  padding: 4px;
  transition: color .2s;
}
.field .toggle:hover { color: #1d1d1f; }
.field input.has-toggle { padding-right: 44px; }

/* ── Options row ── */
.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 16px 0 24px;
}

.check-label {
  display: flex; align-items: center; gap: 7px;
  font-size: 13px; color: #86868b;
  cursor: pointer; user-select: none;
}
.check-label input[type=checkbox] { display: none; }
.check-box {
  width: 16px; height: 16px;
  border-radius: 4px;
  border: 1.5px solid #d2d2d7;
  background: #fff;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
  flex-shrink: 0;
}
.check-label input:checked ~ .check-box {
  background: #0071e3;
  border-color: #0071e3;
}
.check-label input:checked ~ .check-box::after {
  content: '';
  width: 9px; height: 5px;
  border-left: 2px solid #fff;
  border-bottom: 2px solid #fff;
  transform: translateY(-1px) rotate(-45deg);
  display: block;
}

.forgot {
  font-size: 13px;
  color: #0071e3;
  text-decoration: none;
}
.forgot:hover { text-decoration: underline; }

/* ── Submit button ── */
.btn {
  width: 100%;
  padding: 13px;
  background: #0071e3;
  border: none;
  border-radius: 980px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 500;
  color: #ffffff;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: background .2s, transform .15s, box-shadow .2s;
  box-shadow: 0 2px 8px rgba(0,113,227,.3);
}
.btn:hover { background: #0077ed; box-shadow: 0 4px 16px rgba(0,113,227,.35); }
.btn:active { transform: scale(.98); }

/* shimmer */
.btn::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(105deg, transparent 35%, rgba(255,255,255,.2) 50%, transparent 65%);
  background-size: 250% 100%;
  background-position: -100% center;
  transition: background-position .5s ease;
}
.btn:hover::after { background-position: 200% center; }

/* spinner */
.btn .spinner {
  display: none;
  width: 18px; height: 18px;
  border: 2px solid rgba(255,255,255,.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  margin: 0 auto;
}
.btn.loading .btn-text { display: none; }
.btn.loading .spinner  { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* success */
.btn.success {
  background: #34c759;
  box-shadow: 0 2px 8px rgba(52,199,89,.3);
  pointer-events: none;
}

/* ── Divider ── */
.divider {
  text-align: center;
  margin: 24px 0 0;
  font-size: 13px;
  color: #86868b;
}
.divider a { color: #0071e3; text-decoration: none; }
.divider a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="card">

  <div class="logo-wrap">
    <div class="logo-icon">
      <!-- Apple-style logo mark -->
      <svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="44" height="44" rx="10" fill="#1d1d1f"/>
        <path d="M22 10L12 15.5V25.5L22 31L32 25.5V15.5L22 10Z" stroke="white" stroke-width="1.8" stroke-linejoin="round"/>
        <path d="M12 15.5L22 21L32 15.5" stroke="white" stroke-width="1.8" stroke-linejoin="round"/>
        <path d="M22 21V31" stroke="white" stroke-width="1.8"/>
      </svg>
    </div>
    <h1>Sign In</h1>
    <p class="subtitle">Use your account to continue</p>
  </div>

  <!-- Fields -->
  <div class="field">
    <label for="ID">ID</label>
    <input type="text" id="ID" placeholder="Enter your ID">
  </div>

  <div class="field">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••" class="has-toggle">
    <button class="toggle" onclick="togglePass(this)" aria-label="Show password">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
      </svg>
    </button>
  </div>

  <div class="row">
    <label class="check-label">
      <input type="checkbox" id="remember">
      <span class="check-box"></span>
      Remember me
    </label>
    <a href="#" class="forgot">Forgot password?</a>
  </div>

  <button class="btn" id="loginBtn" onclick="handleLogin()">
    <span class="btn-text">Sign In</span>
    <div class="spinner"></div>
  </button>

  <p class="divider">Don't have an account? <a href="#">Create one</a></p>

</div>

<script>
  function togglePass(btn) {
    const input = document.getElementById('password');
    const isText = input.type === 'text';
    input.type = isText ? 'password' : 'text';
    btn.querySelector('svg').innerHTML = isText
      ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
      : '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24M1 1l22 22"/>';
  }

  async function getData(id, password) {
    const response = await fetch(`/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id: id, password: password })
    });
  }

  function handleLogin() {
    const id = document.getElementById('ID').value;
    const password = document.getElementById('password').value;
    getData(id, password);
    const btn = document.getElementById('loginBtn');
    btn.classList.add('loading');
    btn.disabled = true;
    setTimeout(() => {
      btn.classList.remove('loading');
      //btn.classList.add('success');
      btn.querySelector('.btn-text').textContent = 'Sign In';
    }, 1800);
  }
</script>
</body>
</html>
