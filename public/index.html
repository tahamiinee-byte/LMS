<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #080810;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
  }

  /* ── Orbs ── */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(90px);
    pointer-events: none;
    z-index: 0;
  }
  .orb-gold  { width: 520px; height: 520px; background: #c8a050; opacity: .13; top: -120px; left: -100px; animation: floatA 10s ease-in-out infinite; }
  .orb-blue  { width: 420px; height: 420px; background: #3050c8; opacity: .10; bottom: -100px; right: -80px;  animation: floatB 13s ease-in-out infinite; }
  .orb-rose  { width: 260px; height: 260px; background: #c84060; opacity: .07; top: 60%; left: 25%;           animation: floatA 8s ease-in-out infinite reverse; }

  @keyframes floatA {
    0%,100% { transform: translateY(0)   scale(1);    }
    50%      { transform: translateY(-35px) scale(1.05); }
  }
  @keyframes floatB {
    0%,100% { transform: translateY(0)   scale(1);    }
    50%      { transform: translateY(28px)  scale(.95); }
  }

  /* ── Card ── */
  .card {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 440px;
    margin: 20px;
    background: rgba(12, 12, 20, .88);
    backdrop-filter: blur(40px);
    border: 1px solid rgba(255,255,255,.07);
    border-radius: 24px;
    padding: 52px 44px 44px;
    box-shadow: 0 40px 120px rgba(0,0,0,.6),
                inset 0 1px 0 rgba(255,255,255,.08);
    animation: cardIn .8s cubic-bezier(.16,1,.3,1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(40px) scale(.96); }
    to   { opacity: 1; transform: translateY(0)    scale(1);   }
  }

  /* ── Logo ── */
  .logo-wrap { text-align: center; margin-bottom: 36px; }

  .logo-icon {
    width: 52px; height: 52px;
    margin: 0 auto 18px;
    background: linear-gradient(135deg, #c8a050, #f0d080);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 32px rgba(200,160,80,.35);
    animation: iconPop .6s .3s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes iconPop {
    from { opacity: 0; transform: scale(.5) rotate(-20deg); }
    to   { opacity: 1; transform: scale(1)  rotate(0deg);   }
  }
  .logo-icon svg { display: block; }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 26px; font-weight: 600;
    color: #e8e4dc; letter-spacing: -.02em;
    margin-bottom: 6px;
  }
  .subtitle { font-size: 14px; color: #55556a; font-weight: 300; }

  /* ── Divider ── */
  .divider { display: flex; align-items: center; gap: 14px; margin: 28px 0; }
  .divider span { font-size: 12px; color: #3a3a4e; letter-spacing: .06em; white-space: nowrap; }
  .divider::before, .divider::after { content:''; flex:1; height:1px; background: rgba(255,255,255,.06); }

  /* ── Fields ── */
  .field { position: relative; margin-bottom: 20px; }

  .field label {
    display: block;
    font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
    color: #44445a; margin-bottom: 8px;
  }

  .field input {
    width: 100%;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.07);
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 15px; font-family: 'DM Sans', sans-serif;
    color: #e0dcd4;
    transition: border-color .25s, box-shadow .25s, background .25s;
    outline: none;
  }
  .field input::placeholder { color: #33334a; }
  .field input:focus {
    border-color: rgba(200,160,80,.5);
    background: rgba(200,160,80,.04);
    box-shadow: 0 0 0 4px rgba(200,160,80,.08);
  }

  /* password toggle */
  .field .toggle {
    position: absolute; right: 14px; top: 38px;
    background: none; border: none; cursor: pointer;
    color: #44445a; padding: 4px;
    transition: color .2s;
  }
  .field .toggle:hover { color: #c8a050; }
  .field input.has-toggle { padding-right: 44px; }

  /* ── Options row ── */
  .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }

  .check-label {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: #44445a; cursor: pointer; user-select: none;
  }
  .check-label input[type=checkbox] { display: none; }
  .check-box {
    width: 16px; height: 16px; border-radius: 5px;
    border: 1px solid rgba(255,255,255,.12);
    background: rgba(255,255,255,.04);
    display: flex; align-items: center; justify-content: center;
    transition: all .2s;
    flex-shrink: 0;
  }
  .check-label input:checked ~ .check-box {
    background: #c8a050; border-color: #c8a050;
  }
  .check-label input:checked ~ .check-box::after {
    content: '';
    width: 9px; height: 6px;
    border-left: 2px solid #080810;
    border-bottom: 2px solid #080810;
    transform: translateY(-1px) rotate(-45deg);
    display: block;
  }

  .forgot { font-size: 13px; color: #44445a; text-decoration: none; transition: color .2s; }
  .forgot:hover { color: #c8a050; }

  /* ── Submit ── */
  .btn {
    width: 100%; padding: 15px;
    background: linear-gradient(135deg, #c8a050, #e0b860);
    border: none; border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 500; letter-spacing: .02em;
    color: #080810; cursor: pointer;
    position: relative; overflow: hidden;
    transition: transform .2s, box-shadow .2s;
    box-shadow: 0 8px 32px rgba(200,160,80,.25);
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 16px 48px rgba(200,160,80,.35); }
  .btn:active { transform: translateY(0); }

  /* shimmer */
  .btn::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(105deg, transparent 35%, rgba(255,255,255,.25) 50%, transparent 65%);
    background-size: 250% 100%;
    background-position: -100% center;
    transition: background-position .5s ease;
  }
  .btn:hover::after { background-position: 200% center; }

  /* spinner */
  .btn .spinner {
    display: none;
    width: 18px; height: 18px;
    border: 2px solid rgba(8,8,16,.25);
    border-top-color: #080810;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin: 0 auto;
  }
  .btn.loading .btn-text { display: none; }
  .btn.loading .spinner  { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* success state */
  .btn.success {
    background: linear-gradient(135deg, #30a860, #50c880);
    box-shadow: 0 8px 32px rgba(60,180,100,.3);
    pointer-events: none;
  }
  .btn.success .btn-text::before { content: '✓  '; }

  /* ── Footer ── */
  .footer {
    text-align: center; margin-top: 28px;
    font-size: 13px; color: #33334a;
  }
  .footer a { color: #c8a050; text-decoration: none; }
  .footer a:hover { text-decoration: underline; }

  /* ── Social ── */
  .socials { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 0; }
  .social-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 12px;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.07);
    border-radius: 12px;
    color: #888899; font-size: 13px;
    cursor: pointer; transition: all .2s;
    text-decoration: none;
  }
  .social-btn:hover { background: rgba(255,255,255,.08); color: #c8c4bc; transform: translateY(-1px); }
</style>
</head>
<body>

  <div class="orb orb-gold"></div>
  <div class="orb orb-blue"></div>

      </div>

    </div>

    <!-- Fields -->
    <div class="field">
      <label for="email">ID</label>
      <input type="text" id="ID" placeholder="Enter Your ID">
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" class="has-toggle">
      <button class="toggle" onclick="togglePass(this)" aria-label="Show password">
        <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>

    <div class="row">
      <label class="check-label">
        <input type="checkbox" id="remember">
        <span class="check-box"></span>
        Remember me
      </label>
      <a href="#" class="forgot">Forgot password?</a>
    </div>

    <button class="btn" id="loginBtn" onclick="handleLogin()">
      <span class="btn-text">Sign In</span>
      <div class="spinner"></div>
    </button>


  </div>

  <script>
    function togglePass(btn) {
      const input = document.getElementById('password');
      const isText = input.type === 'text';
      input.type = isText ? 'password' : 'text';
      btn.querySelector('svg').innerHTML = isText
        ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
        : '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24M1 1l22 22"/>';
    }

    async function getData(id , password){
      const response = await fetch(`/login`,{
        method : "POST",
        headers : {"Content-Type":"application/json"},
        body : JSON.stringify({
          Id : id , 
          Password : password
        })
      });
      
    }
    function handleLogin() {
      const id = document.getElementById('ID').value ;
      const password = document.getElementById('password').value;
      //console.log(id , password);

      getData(id , password)
      const btn = document.getElementById('loginBtn');
      btn.classList.add('loading');
      btn.disabled = true;

      setTimeout(() => {
        btn.classList.remove('loading');
        btn.classList.add('success');
        btn.querySelector('.btn-text').textContent = 'Sign In';
      }, 1800);
    }
  </script>
