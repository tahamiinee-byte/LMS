<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module Portal</title>
    <style>
        /* --- General Setup --- */
        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            color: #333;
            background-color: #fcfcfc;
        }

        /* Increased container width for a "wider" feel */
        .container {
            max-width: 1400px; 
            margin: 0 auto;
            padding: 0 30px;
        }

        /* --- Header / Top Nav --- */
        .top-nav {
            background-color: #1a1a1a;
            color: #fff;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .portal-logo {
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        /* --- Blue Module Banner (Made larger/wider) --- */
        .module-banner {
            background-color: #005580;
            color: white;
            padding: 60px 0; /* Increased padding for more "size" */
            border-bottom: 5px solid #004466;
        }

        .module-banner h1 {
            margin: 0;
            font-size: 2rem; /* Larger font size */
            font-weight: 100;
        }

        .breadcrumb {
            font-size: 0.85rem;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            opacity: 0.8;
        }

        /* --- Three-Column Layout --- */
        .main-layout {
            display: flex;
            margin-top: 20px;
            gap: 20px;
            align-items: flex-start;
            margin-left: 15px;
            
        }

        /* 1. Sidebar (Increased Size) */
        .sidebar {
            width: 220px; /* Increased from 220px */
            flex-shrink: 0;
            margin-right: 20px;
        }

        .sidebar ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .sidebar ul li {
            border-bottom: 1px solid #e6e6e6;
        }

        .sidebar ul li a {
            display: block;
            padding: 18px 15px; /* Larger padding for links */
            color: #444;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.05rem;
            transition: all 0.2s ease;
        }

        .sidebar ul li a:hover {
            background-color: #f0f7ff;
            color: #005580;
            padding-left: 25px; /* Subtle hover slide effect */
        }
        .sidebar form {
        margin: 0; /* remove form margin */
    }

        .sidebar button {
            display: block;
            width: 100%;
            text-align: left;
            background: none;
            border: none;
            padding: 18px 15px; /* same as original <a> */
            color: #444;        /* same text color as original */
            font-weight: 600;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .sidebar button:hover {
            background-color: #f0f7ff; /* same hover as original <a> */
            color: #005580;            /* same hover color */
            padding-left: 25px;        /* same slide effect on hover */
        }
      

        /* 2. Middle Empty Box */
        .middle-content {
            flex-grow: 1; 
            display: flex;
            flex-direction: column;
            align-items: stretch;   /* important */
            justify-content: flex-start; /* important */
            gap: 8px;
            border: 1px solid #e0e0e0;  /* add border */
            border-radius: 6px;
            padding: 15px;
            background: #fff;
            
        }
        .file-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 6px 10px;
            background: #f5f5f5;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .file-row button {
            font-family: inherit;
            flex-grow: 1;            /* take all remaining space */
            text-align: left;
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .file-row button:hover {
            color: #005580;          /* blue text */
            text-decoration: underline; /* underline like <a> */
            background: none;   
        }

        .file-row a {
            text-decoration: none;
            padding: 6px 12px;
            background-color: #005580;
            color: #fff;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        /* 3. Info Panel (Right) */
        .info-panel {
            width: 300px;
            flex-shrink: 0;
            background: #fff;
            padding: 25px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-left: 30px;
        }

        .info-section h3 {
            font-size: 1.2rem;
            margin-top: 0;
            padding-bottom: 10px;
            border-bottom: 3px solid #005580;
            color: #222;
            margin-bottom: 15px;
        }

        .info-section p {
            font-size: 1rem;
            line-height: 1.6;
            color: #555;
        }

        .instructor-list {
            margin-top: 30px;
        }

        .instructor-name {
            display: block;
            font-size: 1rem;
            color: #005580;
            margin-bottom: 8px;
            text-decoration: none;
            font-weight: 500;
        }

        .instructor-name:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
   
    <header class="top-nav">
        <div class="portal-logo">NSCShub</div>
    </header>

    <section class="module-banner">
        <div class="container">
            <h1 id="module_title"></h1>
        </div>
    </section>

    <main class="container main-layout">
        
        <aside class="sidebar">
            <ul id = 'sidebar-list'></ul>
        </aside>

        <section class="middle-content">
            <p>[ Main Content Area ]</p>
        </section>

        <aside class="info-panel">
            <div class="info-section">
                <h3>Module Description</h3>
                <p>
                    This section provides the syllabus, learning outcomes, and core concepts for 
                    <strong id = "module_name"></strong>. 
                </p> 
            </div>

            <div class="info-section instructor-list">
                <h3>Instructors</h3>
                <a href="#" class="instructor-name">Dr. Jane Smith</a>
                <a href="#" class="instructor-name">Prof. John Doe</a>
            </div>
        </aside>

    </main>
    <script> 

       function getLastUrlSegment() {
            const parts = window.location.pathname.split('/').filter(Boolean).pop();
            return parts;
        }

        function formatModuleName(raw) {
            if (!raw) return 'Module';
            const decoded = decodeURIComponent(raw).replace(/[+_-]+/g, ' ').trim();
            return decoded.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        }

        const raw = getLastUrlSegment();
        const formatted = formatModuleName(raw);

        const titleEl = document.getElementById('module_title');
        const nameEl = document.getElementById('module_name');

        if (titleEl) titleEl.textContent = formatted;
        if (nameEl) nameEl.textContent = formatted;

        const sidebarItems = ['Lecture','TD' ,'TP', 'Exams','Resources','GroupInfo']
        const ul = document.getElementById('sidebar-list')

        sidebarItems.forEach(item =>{
            const li = document.createElement('li');
            const button = document.createElement('button');
            button.type = 'button';
            button.textContent = item;
            button.addEventListener('click', async () =>{
                try{
                    const response = await fetch(`/module/api/${raw}/${item}`)
                    if(!response.ok)throw new Error("Failed to fetch");
                    const data = await response.json();
                    const middle = document.querySelector('.middle-content')
                    middle.innerHTML ='';
                    data.forEach(fileName => {
                        const fileDiv = document.createElement('div');
                        fileDiv.classList.add('file-row')
                        

                        // "View" or "Fetch" button
                        const viewBtn = document.createElement('button');
                        viewBtn.textContent = fileName.trim();
                        viewBtn.style.flexGrow = '1';
                        viewBtn.addEventListener('click', () => {
                            console.log(`Fetching content of ${fileName}`);
                        });

                        const downloadBtn = document.createElement('a');
                        downloadBtn.textContent = 'Download';
                        downloadBtn.href = `/module/api/download/${raw}/${item}/${fileName}`;
                        downloadBtn.download = fileName; // tells browser to download
                        

                        fileDiv.appendChild(viewBtn);
                        fileDiv.appendChild(downloadBtn);

                        middle.appendChild(fileDiv);
                    });

                }catch(err){
                    console.log('There is a problme : '+ err )
                }
            })
            li.appendChild(button)
            ul.appendChild(li)
        })
        

  
    </script>

</body>
</html>
