<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module Portal</title>
    <style>
        /* --- Base / Body --- */
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
            background-color: #f5f5f7;
            color: #1d1d1f;
            line-height: 1.6;
        }

        /* --- Container --- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 32px;
        }

        /* --- Top Navigation --- */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 32px;
            position: sticky;
            top: 0;
            background: rgba(255,255,255,0.85);
            backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.1);
            z-index: 100;
        }
        .portal-logo {
            font-weight: 600;
            font-size: 18px;
            letter-spacing: -0.5px;
        }

        /* --- Module Banner --- */
        .module-banner {
            background: #fff;
            padding: 80px 0 60px;
            text-align: center;
            box-shadow: inset 0 -1px 0 #e1e1e1;
        }
        .module-banner h1 {
            font-weight: 600;
            font-size: 36px;
            margin: 0;
            color: #1d1d1f;
        }

        /* --- Main Layout --- */
       .main-layout {
            display: flex;
            gap: 32px;
            margin-top: 48px;
            align-items: flex-start;
        }
        /* --- Sidebar --- */
        .sidebar {
            width: 150px; 
            flex-shrink: 0;
        }
            .sidebar ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .sidebar ul li {
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        .sidebar ul li a {
            display: block;
            padding: 14px 16px;
            color: #1d1d1f;
            font-weight: 500;
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.2s ease;
        }
        .sidebar ul li a:hover {
            background: rgba(0, 113, 227, 0.08);
            color: #0071e3;
            transform: translateX(4px);
        }

        /* --- Middle Content --- */
      .middle-content {
        flex-grow: 1; /* take remaining space */
        min-height: 500px;
        background: #fff;
        border-radius: 20px;
        box-shadow: 0 6px 20px rgba(0,0,0,0.05);
        display: flex;
        justify-content: center;
        align-items: center;
        font-style: italic;
        color: #8e8e93;
    }

        /* --- Info Panel --- */
        .info-panel {
            width: 280px; /* slightly narrower */
            flex-shrink: 0;
            background  : #fff;
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.05);
        }
        .info-section h3 {
            font-weight: 600;
            font-size: 18px;
            margin-top: 0;
            margin-bottom: 12px;
            border-bottom: 2px solid #e1e1e1;
            padding-bottom: 6px;
            color: #1d1d1f;
        }
        .info-section p {
            color: #3c3c4399;
            font-size: 14px;
        }
        .instructor-name {
            display: block;
            color: #0071e3;
            margin-bottom: 6px;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }
        .instructor-name:hover {
            text-decoration: underline;
        }

        /* --- Responsive --- */
        @media (max-width: 1024px) {
            .main-layout {
                flex-direction: column;
            }
            .sidebar, .info-panel {
                width: 100%;
            }
            .middle-content {
                min-height: 300px;
                margin-top: 24px;
            }
        }
    </style>
    </head>
    <body>
   
    <header class="top-nav">
        <div class="portal-logo">NSCShub</div>
    </header>

    <section class="module-banner">
        <div class="container">
            <h1 id="module_title"></h1>
        </div>
    </section>

    <main class="container main-layout">
        
        <aside class="sidebar">
            <ul>
                <li><a href="#">Lecture</a></li>
                <li><a href="#">TD</a></li>
                <li><a href="#">TP</a></li>
                <li><a href="#">Exams</a></li>
                <li><a href="#">Resources</a></li>
                <li><a href="#">Group Info</a></li>
            </ul>
        </aside>

        <section class="middle-content">
            <p>[ Main Content Area ]</p>
        </section>

        <aside class="info-panel">
            <div class="info-section">
                <h3>Module Description</h3>
                <p>
                    This section provides the syllabus, learning outcomes, and core concepts for 
                    <strong id = "module_name"></strong>. 
                </p> 
            </div>

            <div class="info-section instructor-list">
                <h3>Instructors</h3>
                <a href="#" class="instructor-name">Dr. Jane Smith</a>
                <a href="#" class="instructor-name">Prof. John Doe</a>
            </div>
        </aside>

    </main>
    <script> 

       function getLastUrlSegment() {
            const parts = window.location.pathname.split('/').filter(Boolean);
            return parts.length ? parts[parts.length - 1] : '';
        }

        function formatModuleName(raw) {
            if (!raw) return 'Module';
            const decoded = decodeURIComponent(raw).replace(/[+_-]+/g, ' ').trim();
            return decoded.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        }

        const raw = getLastUrlSegment();
        const formatted = formatModuleName(raw);

        const titleEl = document.getElementById('module_title');
        const nameEl = document.getElementById('module_name');

        if (titleEl) titleEl.textContent = formatted;
        if (nameEl) nameEl.textContent = formatted;
    </script>

</body>
</html>
